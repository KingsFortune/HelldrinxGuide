<style>
:root {

  --blue: #6eb5f0; --border: #2a3040;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px 0; position: sticky; top: 0; z-index: 50; }

nav { display: flex; gap: 4px; flex-wrap: wrap; }

  main { padding: 24px 28px 80px; max-width: 1400px; margin: 0 auto; animation: fadeIn .22s ease; }

.arr { font-size: 10px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-bottom: 20px; }

  .prose { color: var(--text); }

  .prose { color: var(--text); }
  .prose b, .prose strong { color: #fff; font-weight: 600; }
  .prose a { color: var(--blue); text-decoration: none; border-bottom: 1px dotted var(--blue); }

a.ilink { color: var(--blue); cursor: pointer; text-decoration: none; border-bottom: 1px dotted var(--blue); }

.opstrip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

#dossier { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; overflow: auto; padding: 20px; }
#dossier.open { display: flex; justify-content: center; align-items: flex-start; }
.dcard { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 24px 28px; max-width: 900px; width: 100%; margin: 20px auto; position: relative; max-height: 90vh; overflow: auto; }
  .dclose { position: absolute; top: 14px; right: 16px; background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 12px; cursor: pointer;

.dcard h2 { margin: 0 0 8px; color: #fff; font-size: 22px; }
.dmeta { color: var(--dim); font-size: 13px; margin-bottom: 16px; }
.dsec { font-weight: 600; color: var(--gold); margin: 18px 0 8px; font-size: 14px; }
.statgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px 16px; font-size: 13px; }
.statgrid b { color: var(--dim); font-weight: 500; margin-right: 6px; }
.loc { display: flex; gap: 10px; padding: 10px 12px; background: var(--panel2); border-radius: 6px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
.pin { font-size: 18px; }
.sub2 { color: var(--dim); font-size: 12.5px; }
.itemgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
.itemgrid .cell { display: flex; gap: 8px; align-items: center; padding: 6px 8px; background: var(--panel2); border-radius: 5px; font-size: 13px; min-width: 0; }
.itemgrid .cell img { width: 32px; height: 32px; max-width: 32px; max-height: 32px; object-fit: contain; flex: none; image-rendering: pixelated; }
.itemgrid .cell > div { min-width: 0; overflow: hidden; }
.em { font-size: 16px; }
.rcard { background: var(--panel2); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.55; }
.rname { font-weight: 600; color: #fff; }
.mod { color: var(--dim); font-size: 12px; }
.chestgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
.chestcard { display: flex; gap: 14px; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color .15s, transform .1s; }
.chestcard:hover { border-color: var(--gold); }
.chestcard img { width: 48px; height: 48px; max-width: 48px; max-height: 48px; object-fit: contain; flex: none; image-rendering: pixelated; }
.dcard h2 img, .dcard .chest-ico { width: 48px !important; height: 48px !important; max-width: 48px; max-height: 48px; object-fit: contain; vertical-align: middle; margin-right: 10px; image-rendering: pixelated; }
.chestcard .cn { font-weight: 600; color: #fff; }
  .chestcard .cmeta { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
.chestcard .cp { margin-left: auto; font-weight: 600; white-space: nowrap; }
  .viewall { color: var(--blue); cursor: pointer; font-size: 12px; white-space: nowrap; transition: color .15s; }
  .viewall:hover { color: #8ec5f0; text-decoration: underline; }
ul.tight { margin: 4px 0; padding-left: 18px; }
ul.tight li { margin: 3px 0; }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--panel2); border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all .25s; z-index: 300; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
tr[data-room], tr[data-pool], tr[data-veh] { cursor: pointer; }
tr[data-room]:hover, tr[data-pool]:hover, tr[data-veh]:hover { background: var(--panel2); }
  .rewline { display: block; margin: 2px 0; }
  .rewline.hc { color: var(--green); font-weight: 600; }
  .tagbar { display: flex; gap: 7px; flex-wrap: wrap; margin: 0 0 14px; align-items: center; }
  .tagbar .lbl { color: var(--dim); font-size: 12px; margin-right: 4px; }
  .tagchip { background: var(--panel2); color: var(--dim); border: 1px solid var(--border); padding: 5px 13px; border-radius: 14px; cursor: pointer; font-size: 12px;
    transition: all .15s; user-select: none; }
  .tagchip:hover { border-color: var(--gold); color: var(--gold); }
  .tagchip.on { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }
  .tagchip:active { transform: scale(.97); }
  .ltag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 8px; margin: 1px 3px 1px 0; white-space: nowrap; }
  .ltag.smithing { background: #3a2818; color: #e8b86d; }
  .ltag.mechanics { background: #1a2838; color: #8fb8e8; }
  .ltag.reloading { background: #331f1a; color: #ff9c8a; }
  .ltag.medical { background: #1a3328; color: #7ee2a0; }
  .ltag.electrical { background: #2a2a18; color: #e8e568; }
  .ltag.tools { background: #252530; color: #b8b8d0; }
  .ltag.storage { background: #1f2a1f; color: #a8d8a8; }
  .ltag.farming { background: #2a3318; color: #b8e878; }
  .ltag.survival { background: #331a28; color: #e898b8; }
/* Wiki layout */
.wiki-page { animation: fadeIn .22s ease; }
.wikicrumbs { font-size: 13px; color: var(--dim); margin-bottom: 16px; }
.wikicrumbs a { color: var(--blue); text-decoration: none; }
.wikicrumbs a:hover { text-decoration: underline; }
.wikigrid { display: grid; grid-template-columns: 1fr min(300px, 32%); gap: 28px; align-items: start; }
@media (max-width: 860px) { .wikigrid { grid-template-columns: 1fr; } }
.wikibody { min-width: 0; }
.wiki-desc { color: var(--dim); margin-bottom: 16px; font-size: 14px; line-height: 1.6; }
.wikiinfobox { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; position: sticky; top: 80px; }
.wikiicon { width: 96px; height: 96px; image-rendering: pixelated; display: block; margin: 0 auto 12px; }
.wikiicon-ph { width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 12px; background: var(--panel); border-radius: 8px; }
.ib-title { font-weight: 700; font-size: 16px; color: #fff; text-align: center; margin-bottom: 4px; }
.ib-id { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 12px; word-break: break-all; }
.ib-table { width: 100%; font-size: 12.5px; }

.ib-share { margin-top: 12px; width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.ib-share:hover { border-color: var(--gold); color: var(--gold); }
@keyframes fadeIn { from { opacity: .55; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  #dossier.open .dcard { animation: dossierIn .2s ease-out; }
  @keyframes dossierIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
td.wrap { max-width: 340px; white-space: normal; word-break: break-word; line-height: 1.55; }

/* ---- build planner (PZ-style) ---- */
.bp-shell { --pz-bg: #1a1714; --pz-panel: #242018; --pz-panel2: #2e2820; --pz-border: #4a4030; --pz-gold: #c8a84b; --pz-green: #5a9a5e; --pz-red: #a85a4a; --pz-text: #d4c8b0; --pz-dim: #8a7d68; }
.bp-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; background: var(--pz-panel); border: 1px solid var(--pz-border); border-radius: 4px; padding: 12px 18px; margin-bottom: 14px; }
.bp-top h3 { margin: 0; color: var(--pz-gold); font-size: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
.bp-pts { display: flex; align-items: baseline; gap: 10px; }
.bp-pts .num { font-size: 36px; font-weight: 800; line-height: 1; color: var(--pz-gold); }
.bp-pts .num.ok { color: #7ec87a; } .bp-pts .num.bad { color: #e08070; }
.bp-pts .lbl { color: var(--pz-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.bp-valid { font-size: 12px; padding: 4px 10px; border-radius: 3px; font-weight: 600; }
.bp-valid.ok { background: #1e3320; color: #7ec87a; border: 1px solid #3a5a3e; }
.bp-valid.bad { background: #331e1e; color: #e08070; border: 1px solid #5a3a3a; }
.bp-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 14px; align-items: start; }
@media (max-width: 960px) { .bp-wrap { grid-template-columns: 1fr; } }
.bp-side { position: sticky; top: 12px; display: flex; flex-direction: column; gap: 10px; }
.bp-card { background: var(--pz-panel); border: 1px solid var(--pz-border); border-radius: 4px; padding: 12px; }
.bp-card h4 { margin: 0 0 8px; color: var(--pz-gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
.bp-occ-row { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 10px; scrollbar-width: thin; }
.bp-occ { flex: 0 0 76px; text-align: center; cursor: pointer; border: 2px solid var(--pz-border); border-radius: 4px; background: var(--pz-panel2); padding: 6px 4px 5px; transition: border-color .12s, background .12s; }
.bp-occ:hover { border-color: var(--pz-gold); }
.bp-occ.on { border-color: var(--pz-gold); background: #3a3020; box-shadow: 0 0 0 1px var(--pz-gold); }
.bp-occ img { width: 52px; height: 52px; object-fit: contain; display: block; margin: 0 auto 4px; image-rendering: auto; }
.bp-occ .oname { font-size: 10px; color: var(--pz-text); line-height: 1.2; max-height: 2.4em; overflow: hidden; }
.bp-occ .ocost { font-size: 10px; color: var(--pz-dim); font-weight: 700; }
.bp-occ-ph { width: 52px; height: 52px; margin: 0 auto 4px; background: #1a1510; border: 1px dashed var(--pz-border); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--pz-dim); }
.bp-search { width: 100%; background: var(--pz-panel2); color: var(--pz-text); border: 1px solid var(--pz-border); border-radius: 3px; padding: 8px 10px; font-size: 13px; margin-bottom: 10px; }
.bp-search:focus { outline: none; border-color: var(--pz-gold); }
.bp-group h4 { display: flex; justify-content: space-between; align-items: baseline; margin: 14px 0 8px; color: var(--pz-gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
.bp-group h4 .count { color: var(--pz-dim); font-size: 11px; text-transform: none; letter-spacing: 0; }
.pz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
.pz-trait { position: relative; background: var(--pz-panel2); border: 2px solid var(--pz-border); border-radius: 4px; padding: 5px 4px 4px; cursor: pointer; text-align: center; transition: border-color .1s, transform .1s, background .1s; min-height: 88px; display: flex; flex-direction: column; align-items: center; }
.pz-trait:hover:not(.disabled) { border-color: var(--pz-gold); transform: translateY(-1px); }
.pz-trait.on { background: #1e2e1e; border-color: var(--pz-green); }
.pz-trait.on.neg { background: #2e1e1e; border-color: var(--pz-red); }

.pz-tico { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 3px; }

.pz-tico-ph { width: 38px; height: 38px; background: #1a1510; border: 1px solid var(--pz-border); border-radius: 3px; font-size: 16px; color: var(--pz-dim); display: flex; align-items: center; justify-content: center; }
.pz-tname { font-size: 10px; color: var(--pz-text); line-height: 1.2; flex: 1; display: flex; align-items: center; word-break: break-word; }
.pz-tcost { font-size: 11px; font-weight: 800; margin-top: 2px; }
.pz-tcost.pos { color: #7ec87a; } .pz-tcost.neg { color: #e08070; }
.pz-trait .star { position: absolute; top: 2px; left: 3px; font-size: 9px; color: var(--pz-gold); }
.pz-trait.on::after { content: '✓'; position: absolute; top: 2px; right: 4px; font-size: 10px; color: var(--pz-green); font-weight: 800; }
.pz-trait.on.neg::after { color: var(--pz-red); }
.bp-skill { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 12px; }
.bp-skill .sn { flex: 1; color: var(--pz-text); }
.bp-skill .sv { color: var(--pz-gold); font-weight: 700; min-width: 20px; text-align: right; }
.bp-bar { height: 5px; background: #1a1510; border-radius: 2px; overflow: hidden; width: 70px; border: 1px solid var(--pz-border); }
.bp-bar > i { display: block; height: 100%; background: linear-gradient(90deg, #8a7030, var(--pz-gold)); }
.bp-selchip { display: inline-flex; align-items: center; gap: 5px; background: var(--pz-panel2); border: 1px solid var(--pz-border); border-radius: 3px; padding: 3px 8px; margin: 2px; font-size: 11px; color: var(--pz-text); }
.bp-selchip img { width: 18px; height: 18px; object-fit: contain; }

.bp-selchip .x:hover { color: #e08070; }
.bp-tip { position: fixed; z-index: 90; max-width: 280px; background: #12100e; border: 1px solid var(--pz-gold); border-radius: 4px; padding: 10px 12px; font-size: 12px; line-height: 1.5; pointer-events: none; opacity: 0; transition: opacity .12s; box-shadow: 0 6px 24px rgba(0,0,0,.7); color: var(--pz-text); }
.bp-tip.show { opacity: 1; }
.bp-tip .tt { color: var(--pz-gold); font-weight: 700; margin-bottom: 4px; }
.bp-tip .tbo { color: #8ab4d4; margin-top: 4px; font-size: 11px; }
.bp-tip .tconf { color: #e08070; margin-top: 5px; font-size: 11px; }
.bp-intro { background: var(--pz-panel); border: 1px solid var(--pz-border); border-radius: 4px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--pz-dim); }
.bp-intro b { color: var(--pz-text); }
.bp-detail-head { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
.bp-detail-head img { width: 48px; height: 48px; object-fit: contain; flex: none; }

.bp-detail-head .meta { flex: 1; min-width: 0; }
.bp-detail-head .dn { font-weight: 700; color: #eee; font-size: 14px; line-height: 1.2; }
.bp-detail-head .dc { font-size: 12px; font-weight: 800; margin-top: 2px; }
.bp-detail-desc { font-size: 12.5px; line-height: 1.55; color: var(--pz-text); margin-bottom: 8px; }
.bp-detail-mech .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--pz-gold); margin-bottom: 4px; font-weight: 700; }
.bp-detail-mech ul { margin: 0; padding-left: 16px; font-size: 12px; line-height: 1.5; color: #b8c8d8; }

.bp-detail-mod { font-size: 10px; color: var(--pz-dim); margin-top: 6px; }
.pz-trait.preview, .bp-occ.preview { outline: 1px solid var(--pz-gold); box-shadow: 0 0 0 1px var(--pz-gold); }

<script>
'use strict';

const n = x => parseFloat(x) || 0;
const I = GUIDE_DATA.items.slice();
for (const it of I) {
  if (it._kind === 'Melee' || it._kind === 'Gun') {
    it._avg = (n(it.MinDamage) + n(it.MaxDamage)) / 2;
    it._dur = n(it.ConditionMax) * n(it.ConditionLowerChanceOneIn);
  }
  if (it._kind === 'Clothing') {
    it._prot = n(it.BiteDefense) + n(it.ScratchDefense) + n(it.BulletDefense);
    it._loc = (it.BodyLocation || '').replace(/^[\w]+:/, '');
  }
  if (it._kind === 'Container') {
    it._loc = (it.BodyLocation || it.CanBeEquipped || '').replace(/^[\w]+:/, '');
    it._slots = (it.AttachmentsProvided || '').split(';').filter(Boolean).length;
  }
}

const seen = new Map(), DEDUP = [];
for (const it of I) {
  const base = it.DisplayName.replace(/\s*\((Wood|Black|White|Brown|Grey|Green|Pink|Orange|Blue|Purple|Red|Camo[\w ]*)\)\s*/gi, '').trim();
  const key = [it._src, it._kind, base, it.MinDamage, it.MaxDamage, it.CriticalChance, it.Capacity, it.BiteDefense, it.AmmoType, it.PartType].join('|');
  if (seen.has(key)) { seen.get(key)._variants = (seen.get(key)._variants || 1) + 1; continue; }
  const copy = Object.assign({}, it, { DisplayName: base });
  seen.set(key, copy);
  DEDUP.push(copy);
}

const BY_ID = new Map(I.map(i => [i._id, i]));
const BY_NAME = new Map();
for (const it of I) {
  const dn = it.DisplayName.toLowerCase().trim();
  if (!BY_NAME.has(dn)) BY_NAME.set(dn, it._id);
}
const cleanChestName = n => (n || '').replace(/^\d+\s*-\s*/, '').trim();
const resolveItemId = name => {
  const nm = (name || '').trim().toLowerCase();
  if (BY_NAME.has(nm)) return BY_NAME.get(nm);
  const hit = I.find(i => {
    const d = i.DisplayName.toLowerCase();
    return d === nm || d.includes(nm) || nm.includes(d);
  });
  return hit?._id || null;
};
const SKIP_STAT = new Set(['_id','_src','_kind','_avg','_dur','_prot','_loc','_slots','DisplayName','_desc','_variants']);
window.BY_ID = BY_ID;
window.SKIP_STAT = SKIP_STAT;

const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const KIND_EMOJI = { Melee: '⚔️', Gun: '🔫', WeaponPart: '🔧', Clothing: '🧥', Container: '🎒', Vehicle: '🚗', QoL: '🔩' };
const kindEmoji = k => KIND_EMOJI[k] || '📦';

// ---------- notes (keep it short — tables have the stats) ----------
const INTEL = {
  overview: [
    { h: "HC", t: "Kill rewards scale with zone difficulty. Vouchers (50/100) are tradeable. Details in <b>Economy</b>." },
    { h: "Best bags — map spawns", hot: true, t: "<b>IrisEyot Backpack</b> (63 cap) — IrisEyot map, <code>liveshow</code> room. <b>Miku Backpack</b> (60 cap, 99% WR) — Estate 39, <code>mikuroom</code>. Early option: <b>AnruisiTown Military Storage Backpack</b> (46/99%). Click names for coords." },
    { h: "Data gaps", t: "WILDSTEEL isn't parsed. Vending prices are live-tuned — check machines in-game. Daisy County dev items marked <i>verify</i>." },
  ],
  armor: [
    { h: "Exo farm", hot: true, t: "Exoskeleton (150/150/100, 0.93× speed) pools heaviest in <b>armor storage</b>, then military crates, gun stores. EOD/Jugg same stats at 0.5× speed — skip unless desperate." },
    { h: "Helmets", t: "120/120/100 helmets with no speed penalty exist. Wear one." },
  ],
  slots: [
    { h: "Weight reduction", t: "99% WR beats raw capacity for heavy loot. 46 cap @ 99% often beats 63 cap @ 95%." },
    { h: "Max slots", t: "Backpack + Authentic Z T3 traits + ALICE webbing + bandolier + JSling + fanny packs. See Packs table for slot counts." },
  ],
};

  { m: /^Base\.IrisEyotBackpack/, label: 'IrisEyot Backpack' },
  { m: /^Base\.MikuBackPack/, label: 'Miku Backpack' },

  { m: /LegendaryDuffel/i, label: 'Legendary Duffel' },
];

const OPGUIDES = [
  { m: /^KenshiBlacksmithing\.Falling_Sun/, star: 'Falling Sun', t: `50% crit / 10×, cond 50 @ 1-in-10 — ~20× less durable than Legendary gear. Blacksmith 9, learn <i>Forge Falling Sun</i>. 3× sheet metal, 3× small sheet, long handle, iron bar.` },
  { m: /^Base\.EXO_Suit/, star: 'Exoskeleton Suit', t: `150/150/100 protection, 0.93× speed.<br><b>Farm:</b> armor storage (weight 0.45) → military containers (0.35) → gun stores (0.28) → army surplus (0.25). Military map zombies can wear Brita gear too.` },
  { m: /^Base\.(EOD_Armor|JUGG_Armor)/, star: 'EOD / Juggernaut', t: `Same 150/150/100 as Exo but 0.5× speed. Same loot pools — keep as backup, keep farming Exo.` },
  { m: /^Base\.IrisEyotBackpack/, star: 'IrisEyot Backpack', t: `63 cap / 95% WR.<br><b>Spawn:</b> IrisEyot map, <code>liveshow</code> room — shelves, 2 rolls @ weight 1000.<br><b>Extra:</b> <code>abby</code> room crate rolls 10× vanilla katanas @ 1000 (good HC fodder).` },
  { m: /^Base\.MikuBackPack/, star: 'Miku Backpack', t: `60 cap / 99% WR + 4 attachment slots.<br><b>Spawn:</b> Estate 39, <code>mikuroom</code> — military locker + side table, 4 rolls @ 100 each. MikuCanteen in same locker.` },
  { m: /LegendaryDuffel/i, star: 'Legendary Duffel', t: `49 cap / 99% WR, lower-back slot — stacks with backpack. Also a quest reward (check Economy → Quests). Spawn pools in wiki page below.` },
  { m: /LegendarySatchel/i, star: 'Legendary Satchel', t: `49 cap / 99% WR, satchel slot — third bag layer. See spawn table.` },
  { m: /^Base\.M72_LAW/, star: 'M72 LAW', t: `100 dmg single-shot rocket. No natural loot table — HC shop, quest, or admin only.` },
];

const opFor = id => OPGUIDES.find(g => g.m.test(id));
const pinItem = g => g.qol ? GUIDE_QOL.items.find(i => g.m.test(i._id)) : I.find(i => g.m.test(i._id));

const ECON_INTEL = {
  earning: [
    { h: "Kills", hot: true, t: "HC scales with PhunZone difficulty: easy ×0.5, medium ×1, hard ×1.5, <b>very hard ×2 (~20 HC/kill)</b>. Horde night multiplies very-hard zones further (HDX_Hordes). ~500 kills ≈ 10k HC." },
    { h: "Quests", t: "ECHO + survivor quests pay HC, items, XP. Unclaimed rewards include <b>Legendary Duffel</b> and <b>M923 truck keys</b> — see Quests table." },
    { h: "Outposts", t: "47 claimable sites pay item bundles every 2–5 days. Coordinates, intervals, and pools in the Outposts table." },
    { h: "Casino", t: "Slots ~89.8% RTP. Roulette even-money ~97.3%. All house games lose long-term — poker is PvP only. Bets: slots 100–5000, roulette 50–2000." },
    { h: "Vouchers", t: "<code>HC Voucher</code> (50/100) = tradeable HC. Vending prices are admin-tuned; Discord chest shop is the main sink." },
  ],
  chests: [
    { h: "Tiers", hot: true, t: "Discord shop (<a class='ilink' style='border:none' href='http://158.69.127.148:3001/' target='_blank' rel='noopener'>wiki ↗</a>): Common <b>3,500</b> / Rare <b>7,000</b> / Epic <b>13,000</b> / Legendary <b>20,000</b> — 3 items each. All tiers can drop <b>Pieces</b> for premium chests (Mythical, Military, Vehicles, Cats)." },
    { h: "Piece value", hot: true, t: "Expected HC/piece: Pieces Chest <b>10,000</b> (guaranteed) · Common ~12,800 · Legendary ~26,700 · Rare ~23,300 · Epic ~39,000. Buy Pieces Chest for pure progress; Legendary if you want its item pool." },
    { h: "Best pools", t: "<b>Military Chest</b> — 26 items, 75% Legendary / 25% Mythical. <b>Mythical</b> — 7 vehicles. Click chests below for full lists." },
  ],
  quests: [
    { h: "ECHO Act 1", t: "Starts Route 9 gas station (Shab). Table has objectives, rewards, NPC coords." },
    { h: "Worth chasing", hot: true, t: "<b>Legendary Duffel</b>, <b>M923 keys</b> (×2), Charizard/Blue-Eyes cards, Sed's silver bundles." },
  ],
  outposts: [
    { h: "Basics", t: "Clear infestation radius, claim, get <b>rewardCount</b> items per <b>interval</b> days. Prefer 2-day interval + count 3 + pool you actually use." },
  ],
};

const LOOT_INTEL = [
  { h: "Farm routes", hot: true, t: "Brita armor (Exo/EOD/Jugg): <b>armor storage</b> → military → gun stores. QoL gear: use <b>QoL & Tools</b> tab + tag filters (e.g. Smithing & Forging for iron molds)." },
  { h: "Fixed spawns", hot: true, t: "<b>IrisEyot</b> <code>liveshow</code> — IrisEyot Backpack. <b>Estate 39</b> <code>mikuroom</code> — Miku Backpack. Hotspot Rooms table has coords for every scripted room." },
  { h: "Respawn", t: "Loot respawns on a server timer — rotate 2–3 routes instead of pushing outward forever." },
  { h: "Reading weights", t: "Weight = chance within a roll (1000 ≈ guaranteed). Rolls = draws per container. Click items for full spawn breakdown." },
];

const VEH_INTEL = [
  { h: "Super Bulldozer", hot: true, t: "5 modes: Standard (crush + loot), Foliage, Gravel (pave roads), EXTREME (flatten terrain). Top speed 35." },
  { h: "'93 Elgin Sweeper", hot: true, t: "Vacuums ground loot into truck storage while driving. Top speed 30." },
  { h: "Military", t: "M113 APC (6 seats, 400 trunk). M60A3 tank (working gun). BTR-80, BMP-2, M41. ECHO quests give <b>M923 keys</b>." },
  { h: "Fuel & garage", t: "M49A2C tanker + trailer cisterns for base fuel. FunctionalCarLift, VehicleTuner, repair/salvage overhaul mods installed." },
  { h: "Speed / haul", t: "Fastest: Charger Daytona (201), McLaren F1 (180). Biggest haul: M1095 trailer (700). <b>NoVanillaVehicles</b> — all road spawns are modded." },
];

const POOL_HINTS = [
  [/blacksmith|metalwork|smelting|BlacksmithMolds|BlacksmithTools|MetalShop|ToolStoreMetal/i, 'Metalworking shops, forges & tool stores'],
  [/police.*gun|gunlocker|policestorageguns/i, 'Police station — weapon lockers'],
  [/police.*locker|policestorage/i, 'Police station lockers'],
  [/army.*storage|armystorage|military.*locker/i, 'Military bases — storage lockers'],
  [/gunstore|gun.*store/i, 'Gun stores'],
  [/armor.*storage/i, 'Armor storage rooms'],
  [/survivor.*cache|survivorcache/i, 'Survivor caches'],
  [/antique/i, 'Antique stores'],
];

function poolHint(where) {
  for (const [re, hint] of POOL_HINTS) if (re.test(where)) return hint;
  return null;
}

function floorName(z) {
  const f = +z;
  if (f <= -1) return 'basement';
  if (f === 0) return 'ground floor';
  if (f === 1) return '1st floor';
  return f + 'th floor';
}

function roomLocs(room) {
  return GUIDE_ROOMS[room] || [];
}

function notes(list) {
  const d = document.createElement('div');
  d.className = 'grid';
  d.innerHTML = list.map(x => `<div class="note ${x.hot ? 'hot' : ''}"><h3>${x.h}</h3><div class="prose">${x.t}</div></div>`).join('');
  return d;
}

function coordCell(val) {
  if (!val) return '<span class="count">—</span>';
  return `<b style="color:#7ee2a0">${esc(val)}</b> <span class="viewall" data-copy="${esc(val)}">⧉ copy</span>`;
}

function secHead(t) {
  const d = document.createElement('div');
  d.className = 'sechead';
  d.textContent = t;
  return d;
}

function linkItem(id, name, star) {
  const s = star ? ' star' : '';
  return `<a class="ilink${s}" data-id="${esc(id)}">${esc(name)}</a>`;
}

function itemGrid(items) {
  return `<div class="itemgrid">` + items.slice().sort((a, b) => (b.w || 0) - (a.w || 0)).map(i => {
    const inner = i.id ? linkItem(i.id, i.disp) : esc(i.disp);
    return `<div class="cell"><span class="em">${kindEmoji(i.kind)}</span><div style="flex:1">${inner}${i.w ? ` <span class="count">w${i.w}</span>` : ''}</div></div>`;
  }).join('') + `</div>`;
}

function chestItemGrid(items) {
  const byType = new Map();
  for (const i of items) {
    const t = (i.t || 'Other').trim() || 'Other';
    if (!byType.has(t)) byType.set(t, []);
    byType.get(t).push(i);
  }
  let h = '';
  for (const [type, list] of [...byType.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
    h += `<div class="dsec">${esc(type)} <span class="count">(${list.length})</span></div>`;
    h += `<div class="itemgrid">` + list.slice().sort((a, b) => a.n.localeCompare(b.n)).map(i => {
      const id = resolveItemId(i.n);
      const inner = id ? linkItem(id, i.n) : esc(i.n);
      return `<div class="cell">${i.ic ? `<img src="${esc(i.ic)}" loading="lazy" alt="">` : '<span class="em">📦</span>'}<div style="flex:1">${inner}</div></div>`;
    }).join('') + `</div>`;
  }
  return h;
}

function poolDetail(where, weight, rolls, mod) {
  const pool = where.replace(/ \(vehicle\)$/, '');
  const pl = typeof GUIDE_POOL_LOCS !== 'undefined' && GUIDE_POOL_LOCS.pools[pool];
  const wt = weight ? ` <span class="count">item weight ${weight}${rolls ? ` · ${rolls} rolls` : ''}</span>` : '';
  const hint = pl?.hint;
  if (hint) return hint + wt;
  return `<b>${esc(pool)}</b>${pl?.vehicle ? ' (vehicle cargo)' : ' loot pool'}${wt}${mod && mod !== 'Vanilla' ? ` · <span class="mod">${esc(mod)}</span>` : ''}`;
}

function mergeSpawns(id, spawns) {
  const short = id.replace(/^[\w]+\./, '');
  const a = spawns[id] || [], b = spawns[short] || [];
  if (!a.length) return b;
  if (!b.length) return a;
  const seenK = new Set(), out = [];
  for (const s of [...b, ...a]) {
    const k = [s.where, s.mod, s.weight, s.rolls].join('|');
    if (seenK.has(k)) continue;
    seenK.add(k); out.push(s);
  }
  return out;
}

function whereCards(lines) {
  if (!lines || !lines.length) return '';
  return `<div class="dsec">Locations</div>` +
    lines.map(w => `<div class="loc" style="border-left-color:var(--green)"><span class="pin">🎯</span><div style="flex:1"><div class="prose">${w}</div></div></div>`).join('');
}

function spawnLocHTML(sp) {
  const rooms = [], pools = new Map();
  for (const s of sp) {
    const rm = s.where.match(/^room "([^"]+)" → (\w+)$/);
    if (rm) rooms.push({ room: rm[1], cont: rm[2], weight: s.weight, rolls: s.rolls, mod: s.mod, locs: roomLocs(rm[1]) });
    else if (!pools.has(s.where)) pools.set(s.where, { where: s.where, weight: s.weight, rolls: s.rolls, mod: s.mod });
  }
  let h = '';
  if (rooms.length) {
    h += `<div class="dsec">Room spawns</div>`;
    for (const r of rooms) {
      if (r.locs.length) for (const L of r.locs) {
        h += `<div class="loc"><span class="pin">📍</span><div style="flex:1">
          <b>${esc(L.map)}</b> — room "${esc(r.room)}" <span class="count">(${esc(r.cont)})</span><br>
          <span class="sub2">Go to <b style="color:#7ee2a0">${L.x}, ${L.y}</b> · ${floorName(L.z)}${r.weight ? ` · spawn weight ${r.weight}` : ''}${r.rolls ? ` · ${r.rolls} rolls` : ''}</span></div>
          <span class="viewall" data-copy="${L.x},${L.y},${L.z}">⧉ copy</span></div>`;
      } else h += `<div class="loc" style="border-left-color:var(--gold)"><span class="pin">🏠</span><div style="flex:1">
          <b>room "${esc(r.room)}"</b> <span class="count">(${esc(r.cont)})</span><br>
          <span class="sub2">On the <b>${esc(r.mod)}</b> map — search that map area${r.weight ? ` · weight ${r.weight}` : ''}</span></div></div>`;
    }
  }
  if (pools.size) {
    h += `<div class="dsec">Where to search (building + container)</div>`;
    const sorted = [...pools.values()].sort((a, b) => (a.mod === 'Vanilla' ? -1 : 1) - (b.mod === 'Vanilla' ? -1 : 1) || (b.weight || 0) - (a.weight || 0));
    for (const p of sorted.slice(0, 18)) {
      h += `<div class="loc" style="border-left-color:var(--blue)"><span class="pin">📦</span><div style="flex:1"><div class="prose">${poolDetail(p.where, p.weight, p.rolls, p.mod)}</div></div></div>`;
    }
    if (sorted.length > 18) h += `<p class="count">+${sorted.length - 18} more spawn pools.</p>`;
  }
  return h;
}

function locCard(L) {
  return `<div class="loc"><span class="pin">📍</span><div style="flex:1">
    <b>${esc(L.map)}</b> · <b style="color:#7ee2a0">${L.x}, ${L.y}</b> · ${floorName(L.z)}</div>
    <span class="viewall" data-copy="${L.x},${L.y},${L.z}">⧉ copy</span></div>`;
}

// ---------- QoL ----------
const QOL_BY_ID = new Map((typeof GUIDE_QOL !== 'undefined' ? GUIDE_QOL.items : []).map(i => [i._id, i]));
const QOL_BY_SHORT = new Map();
for (const q of QOL_BY_ID.values()) QOL_BY_SHORT.set(q._id.replace(/^[\w]+\./, ''), q);
window.QOL_BY_ID = QOL_BY_ID;
const LOOT_TAGS = typeof GUIDE_QOL !== 'undefined' ? GUIDE_QOL.tags : {};

function tagHTML(tags) {
  if (!tags || !tags.length) return '<span class="count">—</span>';
  return tags.map(t => `<span class="ltag ${t}">${esc(LOOT_TAGS[t] || t)}</span>`).join('');
}

function tagBar(active, onPick) {
  const bar = document.createElement('div'); bar.className = 'tagbar';
  bar.innerHTML = `<span class="lbl">Tags:</span>`;
  const all = document.createElement('button'); all.type = 'button'; all.className = 'tagchip' + (!active ? ' on' : '');
  all.textContent = 'All'; all.onclick = () => onPick('');
  bar.append(all);
  for (const [id, label] of Object.entries(LOOT_TAGS)) {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'tagchip' + (active === id ? ' on' : '');
    b.textContent = label; b.onclick = () => onPick(id);
    bar.append(b);
  }
  return bar;
}

// ---------- tables ----------
let sortKey = 'DisplayName', sortDir = -1;

function tableView(rows, cols) {
  const mods = [...new Set(rows.map(r => r._src))].sort();
  return { rows, cols, mods };
}

function tableSection(spec, defaultSort, tagKey, tagFilter) {
  if (tagKey) return lootTableSection(spec, defaultSort, tagKey, tagFilter);
  sortKey = defaultSort; sortDir = -1;
  const div = document.createElement('div');
  const state = { q: '', mod: '' };
  const rerender = () => renderTable(div, spec, state);
  div.innerHTML = `<div class="controls"><input type="search" placeholder="search…">
    <select><option value="">all mods (${spec.mods.length})</option>${spec.mods.map(m => `<option>${esc(m)}</option>`).join('')}</select>
    <span class="count"></span></div>
    <div style="max-height:70vh;overflow:auto;border:1px solid var(--border);border-radius:6px"><table><thead></thead><tbody></tbody></table></div>`;
  div.querySelector('input').oninput = e => { state.q = e.target.value; rerender(); };
  div.querySelector('select').onchange = e => { state.mod = e.target.value; rerender(); };
  rerender();
  return div;
}

function lootTableSection(spec, defaultSort, tagKey, tagFilter) {
  sortKey = defaultSort; sortDir = -1;
  const div = document.createElement('div');
  const state = { q: '', mod: '', tag: tagFilter || '' };
  const rerender = () => {
    if (tagKey) {
      const old = div.querySelector('.tagbar');
      const bar = tagBar(state.tag, t => { state.tag = t; rerender(); });
      if (old) old.replaceWith(bar); else div.insertBefore(bar, div.querySelector('.controls'));
    }
    renderLootTable(div, spec, state, tagKey);
  };
  div.innerHTML = `<div class="controls"><input type="search" placeholder="search name, slot, or tag…">
    <select><option value="">all mods (${spec.mods.length})</option>${spec.mods.map(m => `<option>${esc(m)}</option>`).join('')}</select>
    <span class="count"></span></div>
    <div style="max-height:70vh;overflow:auto;border:1px solid var(--border);border-radius:6px"><table><thead></thead><tbody></tbody></table></div>`;
  div.querySelector('input').oninput = e => { state.q = e.target.value; rerender(); };
  div.querySelector('select').onchange = e => { state.mod = e.target.value; rerender(); };
  rerender();
  return div;
}

function renderTable(host, spec, state, tagKey) {
  if (tagKey) return renderLootTable(host, spec, state, tagKey);
  return renderTableCore(host, spec, state);
}

function renderTableCore(host, spec, state) {
  const q = state.q.toLowerCase(), mod = state.mod;
  let rows = spec.rows.filter(r => {
    if (mod && r._src !== mod) return false;
    if (!q) return true;
    return r.DisplayName.toLowerCase().includes(q) || String(r._id || '').toLowerCase().includes(q);
  });
  const col = spec.cols.find(c => c.k === sortKey) || spec.cols[0];
  rows.sort((a, b) => {

let LOOT = null;
function lootData() {
  const sp = GUIDE_DETAILS.spawns;
  const nameOf = {}, idOf = {}, kindOf = {}, tagsOf = {}, catOf = {}, noteOf = {};
  for (const it of I) { const s = it._id.replace(/^[\w]+\./, ''); if (!nameOf[s]) { nameOf[s] = it.DisplayName; idOf[s] = it._id; kindOf[s] = it._kind; } }
  for (const q of QOL_BY_ID.values()) {
    const s = q._id.replace(/^[\w]+\./, '');
    if (!nameOf[s]) { nameOf[s] = q.DisplayName; idOf[s] = q._id; kindOf[s] = 'QoL'; }
    tagsOf[s] = q._tags; catOf[s] = q._cat; if (q._note) noteOf[s] = q._note;
    tagsOf[q._id] = q._tags; catOf[q._id] = q._cat; if (q._note) noteOf[q._id] = q._note;
  }
  const rooms = new Map(), pools = new Map(), finder = new Map(), roomByKey = new Map(), poolByKey = new Map();
  for (const [key, entries] of Object.entries(sp)) {
    for (const e of entries) {
      const item = { short: key, disp: nameOf[key] || key, id: idOf[key] || null, kind: kindOf[key] || null, w: e.weight, tags: tagsOf[key] || [] };
      const rm = e.where.match(/^room "([^"]+)" → (\w+)$/);
      if (rm) {
        const rk = rm[1] + '|' + e.mod;
        if (!rooms.has(rk)) rooms.set(rk, { room: rm[1], cont: rm[2], mod: e.mod, items: [], locs: roomLocs(rm[1]) });
        rooms.get(rk).items.push(item);
        roomByKey.set(rk, rooms.get(rk));
      } else {
        const pk = e.where + '|' + e.mod;
        if (!pools.has(pk)) pools.set(pk, { where: e.where, mod: e.mod, hint: poolHint(e.where), items: [], mods: new Set([e.mod]) });
        pools.get(pk).items.push(item);
        poolByKey.set(pk, pools.get(pk));
      }
      if (!finder.has(key)) finder.set(key, {
        short: key, disp: nameOf[key] || key, id: idOf[key] || null, kind: kindOf[key] || null,
        mod: e.mod, spots: [], tags: tagsOf[key] || [], cat: catOf[key] || null, note: noteOf[key] || null,
      });
      finder.get(key).spots.push(e);
    }
  }
  return { rooms: [...rooms.values()], pools: [...pools.values()], finder: [...finder.values()], roomByKey, poolByKey, nameOf, idOf, tagsOf };
}
function ensureLoot() { if (!LOOT) LOOT = lootData(); }

  top.innerHTML = `<h3>Character Build</h3><div class="bp-pts"><div><div class="num ok" id="bpNum">0</div><div class="lbl">Points</div></div><div class="bp-valid ok" id="bpValid">✓ Valid</div></div>`;
  wrap.append(top);

  const occCard = document.createElement('div'); occCard.className = 'bp-card';
  occCard.innerHTML = '<h4>Occupation</h4>';
  const occRow = document.createElement('div'); occRow.className = 'bp-occ-row';
  occCard.append(occRow);
  wrap.append(occCard);

  const grid = document.createElement('div'); grid.className = 'bp-wrap';
  const left = document.createElement('div');
  const side = document.createElement('div'); side.className = 'bp-side';
  grid.append(left, side);
  wrap.append(grid);

  side.innerHTML = `
    <div class="bp-card"><h4>Details</h4><div id="bpDetail"><span class="count">Hover a trait or occupation…</span></div></div>
    <div class="bp-card"><h4>Occupation Info</h4><div id="bpOccInfo"><span class="count">Select an occupation above.</span></div></div>
    <div class="bp-card"><h4>Starting Skills</h4><div id="bpSkills"><span class="count">—</span></div></div>
    <div class="bp-card"><h4>Selected Traits</h4><div id="bpSel"><span class="count">None</span></div></div>`;

  const search = document.createElement('input'); search.className = 'bp-search'; search.type = 'search'; search.placeholder = 'Search traits…';
  left.append(search);
  const posWrap = document.createElement('div'); posWrap.className = 'bp-group';
  const negWrap = document.createElement('div'); negWrap.className = 'bp-group';
  left.append(posWrap, negWrap);

  const occEls = new Map();
  const sortedProfs = [...PR].sort((a, b) => (a.id === 'unemployed' ? -1 : b.id === 'unemployed' ? 1 : a.name.localeCompare(b.name)));
  for (const p of sortedProfs) {
    const el = document.createElement('div');
    el.className = 'bp-occ' + (BP.occId === p.id ? ' on' : '');
    el.dataset.id = p.id;
    el.title = `${p.name} (${p.cost > 0 ? '+' : ''}${p.cost} pts)`;
    const ico = document.createElement('div');
    if (p.icon) { const img = document.createElement('img'); img.src = p.icon; img.alt = p.name; img.loading = 'lazy'; ico.append(img); }
    else { const ph = document.createElement('div'); ph.className = 'bp-occ-ph'; ph.textContent = p.name.charAt(0); ico.append(ph); }
    el.append(ico);
    const nm = document.createElement('div'); nm.className = 'oname'; nm.textContent = p.name; el.append(nm);
    const co = document.createElement('div'); co.className = 'ocost'; co.textContent = (p.cost > 0 ? '+' : '') + p.cost; el.append(co);
    el.addEventListener('mouseenter', () => { el.classList.add('preview'); bpSetPreview(p, 'prof'); });
    el.addEventListener('mouseleave', () => { el.classList.remove('preview'); });
    el.addEventListener('click', () => { BP.occId = p.id; bpSetPreview(p, 'prof'); update(); });
    occRow.append(el);
    occEls.set(p.id, el);
  }

  const makeTrait = t => {
    const el = document.createElement('div');
    el.className = 'pz-trait' + (t.cost < 0 ? ' neg' : '');
    el.dataset.id = t.id;
    if (t.special) { const s = document.createElement('span'); s.className = 'star'; s.textContent = '★'; el.append(s); }
    const ico = document.createElement('div'); ico.className = 'pz-tico';
    if (t.icon) { const img = document.createElement('img'); img.src = t.icon; img.alt = ''; img.loading = 'lazy'; ico.append(img); }
    else { const ph = document.createElement('div'); ph.className = 'pz-tico-ph'; ph.textContent = t.name.charAt(0); ico.append(ph); }
    el.append(ico);
    const nm = document.createElement('div'); nm.className = 'pz-tname'; nm.textContent = t.name; el.append(nm);
    const co = document.createElement('div'); co.className = 'pz-tcost ' + (t.cost > 0 ? 'pos' : 'neg'); co.textContent = (t.cost > 0 ? '+' : '') + t.cost; el.append(co);
    el.addEventListener('mouseenter', e => { el.classList.add('preview'); bpSetPreview(t, 'trait'); bpShowTip(t, e.clientX, e.clientY); });
    el.addEventListener('mousemove', e => bpShowTip(t, e.clientX, e.clientY));
    el.addEventListener('mouseleave', () => { el.classList.remove('preview'); bpHideTip(); });
    el.addEventListener('click', () => { if (el.classList.contains('disabled')) return; bpSetPreview(t, 'trait'); BP.sel.has(t.id) ? BP.sel.delete(t.id) : BP.sel.add(t.id); update(); });
    return el;
  };

  const pos = TR.filter(t => t.cost > 0), neg = TR.filter(t => t.cost < 0);
  posWrap.innerHTML = `<h4><span>Positive</span><span class="count">${pos.length}</span></h4>`;
  const posGrid = document.createElement('div'); posGrid.className = 'pz-grid'; posWrap.append(posGrid);
  negWrap.innerHTML = `<h4><span>Negative</span><span class="count">${neg.length}</span></h4>`;
  const negGrid = document.createElement('div'); negGrid.className = 'pz-grid'; negWrap.append(negGrid);
  const cards = new Map();
  for (const t of pos) { const c = makeTrait(t); posGrid.append(c); cards.set(t.id, c); }
  for (const t of neg) { const c = makeTrait(t); negGrid.append(c); cards.set(t.id, c); }

  search.addEventListener('input', () => {
    const q = search.value.toLowerCase();
    for (const [id, c] of cards) {
      const t = byId.get(id);
      c.style.display = (!q || t.name.toLowerCase().includes(q) || (t.desc || '').toLowerCase().includes(q) || (t.mechanics || []).join(' ').toLowerCase().includes(q) || (t.boosts && bpBoostStr(t.boosts).toLowerCase().includes(q))) ? '' : 'none';
    }
  });

  function update() {
    const occ = PR.find(p => p.id === BP.occId) || PR.find(p => p.id === 'unemployed');
    for (const [id, el] of occEls) el.classList.toggle('on', id === BP.occId);
    const blocked = new Set();
    for (const id of BP.sel) for (const c of (byId.get(id)?.conflicts || [])) blocked.add(c);
    let pts = occ ? occ.cost : 8;
    for (const id of BP.sel) pts -= (byId.get(id)?.cost || 0);
    const numEl = top.querySelector('#bpNum'), validEl = top.querySelector('#bpValid');
    numEl.textContent = pts;
    numEl.className = 'num ' + (pts >= 0 ? 'ok' : 'bad');
    validEl.className = 'bp-valid ' + (pts >= 0 ? 'ok' : 'bad');
    validEl.textContent = pts >= 0 ? '✓ Valid build' : `✗ Over by ${-pts}`;
    for (const [id, c] of cards) {
      c.classList.toggle('on', BP.sel.has(id));
      c.classList.toggle('disabled', !BP.sel.has(id) && blocked.has(id));
    }
    const occInfo = side.querySelector('#bpOccInfo');
    if (occ) {
      let h = `<div style="font-weight:600;color:#d4c8b0">${esc(occ.name)}</div>`;
      if (occ.freeTraitNames) h += `<div style="font-size:11px;margin-top:4px"><span style="color:#7ec87a">Free traits:</span> ${esc(occ.freeTraitNames.join(', '))}</div>`;
      occInfo.innerHTML = h;
    }
    const skills = {};
    if (occ?.effective) for (const b of occ.effective) skills[b.skill] = (skills[b.skill] || 0) + b.n;
    for (const id of BP.sel) for (const b of (byId.get(id)?.boosts || [])) skills[b.skill] = (skills[b.skill] || 0) + b.n;
    const skEl = side.querySelector('#bpSkills');
    const rows = Object.entries(skills).filter(([, n]) => n !== 0).sort((a, b) => b[1] - a[1]);
    skEl.innerHTML = rows.length ? rows.map(([s, n]) => `<div class="bp-skill"><span class="sn">${esc(s)}</span><span class="bp-bar"><i style="width:${Math.min(100, Math.abs(n) / 6 * 100)}%;${n < 0 ? 'background:#a85a4a' : ''}"></i></span><span class="sv" style="${n < 0 ? 'color:#e08070' : ''}">${n > 0 ? '+' : ''}${n}</span></div>`).join('') : '<span class="count">—</span>';
    const selEl = side.querySelector('#bpSel');
    if (!BP.sel.size) selEl.innerHTML = '<span class="count">None</span>';
    else selEl.innerHTML = [...BP.sel].map(id => byId.get(id)).filter(Boolean).sort((a, b) => b.cost - a.cost)
      .map(t => `<span class="bp-selchip">${t.icon ? `<img src="${esc(t.icon)}" alt="">` : ''}${t.special ? '★' : ''}${esc(t.name)} <span style="color:${t.cost > 0 ? '#7ec87a' : '#e08070'}">${t.cost > 0 ? '+' : ''}${t.cost}</span><span class="x" data-bpremove="${esc(t.id)}">✕</span></span>`).join('');
  }
  wrap.addEventListener('click', e => { const rm = e.target.closest('[data-bpremove]'); if (rm) { BP.sel.delete(rm.dataset.bpremove); update(); } });
  update();
  const startOcc = PR.find(p => p.id === BP.occId);
  if (startOcc) bpSetPreview(startOcc, 'prof');
  return wrap;
}

  const all = GUIDE_VEH.vehicles.filter(v => !/burnt|wreck|smashed|junkyard|destroyed/i.test(v.name + ' ' + (v.display || '')));

  const special = all.filter(v => v.armed || /bulldozer|elgin|sweeper/i.test(v.name));
  if (special.length) {
    const strip = document.createElement('div');
    strip.innerHTML = `<div class="opstrip">` + special.map(v =>
      `<a data-veh="${esc(v.name)}">${v.armed ? '🔫 ' : (/dozer/i.test(v.name) ? '🚜 ' : '🧹 ')}${esc(v.display || v.name)}</a>`).join('') + `</div>`;
    d.append(strip);
  }
  const rows = all.map(v => ({
    _id: v.name, DisplayName: v.display || v.name, _src: v.mod,
    maxSpeed: v.maxSpeed, seats: v.seatsDeclared || v.seats, fuel: v.fuel, trunk: v.trunk, storage: v.storage,
    offRoad: v.offRoad, zones: v.zones ? v.zones.length : 0,
    flags: (v.armed ? '🔫' : '') + (v.armored ? '🛡️' : ''),
  }));
  d.append(secHead('All vehicles — click any name for the full spec sheet'), tableSection(tableView(rows, [
    { k: 'DisplayName', h: 'Vehicle', cls: 'name', f: r => `<span data-veh="${esc(r._id)}" style="cursor:pointer;color:var(--blue);border-bottom:1px dotted var(--blue)">${esc(r.DisplayName)}</span>${r.flags ? ' ' + r.flags : ''}` },
    { k: 'maxSpeed', h: 'Speed', num: 1 },
    { k: 'seats', h: 'Seats', num: 1 },
    { k: 'fuel', h: 'Fuel', num: 1 },
    { k: 'trunk', h: 'Truck bed', num: 1 },
    { k: 'storage', h: 'Storage', num: 1 },
    { k: 'offRoad', h: 'Off-road', num: 1 },
    { k: 'zones', h: 'Spawn zones', num: 1 },
    { k: '_src', h: 'Mod', cls: 'mod' },
  ]), 'maxSpeed'));
  d.insertAdjacentHTML('beforeend', '<p class="count">🔫 armed · 🛡️ armored. Click a vehicle for its full spec sheet: performance, fuel/storage, spawn zones, and every part.</p>');
  return d;
}

const TABS = {
  Home: () => (typeof WIKI_SHELL !== 'undefined' ? WIKI_SHELL.buildHomePage() : document.createElement('div')),
  Character: () => charSubs.Melee(),
  Economy: () => econSubs['Earning HC'](),
  Vehicles: () => vehTab(),
  Loot: () => lootSubs['Item Finder'](),
};

const SUBS = {
  Character: charSubs,
  Economy: econSubs,
  Loot: lootSubs,
};

const tabsEl = document.getElementById('tabs');
const subnavEl = document.getElementById('subnav');
const mainEl = document.getElementById('main');
let currentTab = 'Home', currentSub = null;

function showSubnav(tab, preferSub) {
  subnavEl.innerHTML = '';
  const subs = SUBS[tab];
  if (!subs) { subnavEl.style.display = 'none'; return; }
  subnavEl.style.display = 'flex';
  const keysRaw = Object.keys(subs);
  const keys = (tab === 'Loot' && keysRaw.includes('Item Finder'))
    ? ['Item Finder', ...keysRaw.filter(k => k !== 'Item Finder')]
    : keysRaw;
  if (preferSub && keys.includes(preferSub)) currentSub = preferSub;
  else if (!currentSub || !keys.includes(currentSub)) currentSub = (tab === 'Loot' && keys.includes('Item Finder')) ? 'Item Finder' : keys[0];
  for (const k of keys) {
    const b = document.createElement('button');
    b.textContent = k;
    if (k === currentSub) b.classList.add('on');
    b.onclick = () => {
      currentSub = k;
      subnavEl.querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      mainEl.innerHTML = '';
      mainEl.append(subs[k]());
      if (typeof WIKI_SHELL !== 'undefined') WIKI_SHELL.setSidebarActive(tab, k);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    subnavEl.append(b);
  }
}

function showHome() {
  currentTab = 'Home';
  currentSub = null;
  GUIDE_BOOT.lastTab = 'Home';
  document.body.classList.remove('wiki-mode');
  subnavEl.style.display = 'none';
  mainEl.innerHTML = '';
  mainEl.append(TABS.Home());
  if (typeof WIKI_SHELL !== 'undefined') WIKI_SHELL.setSidebarActive('Home');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showTab(name, preferSub) {
  if (name === 'Home') { showHome(); return; }
  currentTab = name;
  GUIDE_BOOT.lastTab = name;
  document.body.classList.remove('wiki-mode');
  tabsEl.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  showSubnav(name, preferSub);
  mainEl.innerHTML = '';
  const subs = SUBS[name];
  if (subs) {
    const keysRaw = Object.keys(subs);
    const keys = (name === 'Loot' && keysRaw.includes('Item Finder'))
      ? ['Item Finder', ...keysRaw.filter(k => k !== 'Item Finder')]
      : keysRaw;
    if (preferSub && keys.includes(preferSub)) currentSub = preferSub;
    else currentSub = (name === 'Loot' && keys.includes('Item Finder')) ? 'Item Finder' : keys[0];
    subnavEl.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.textContent === currentSub));
    mainEl.append(subs[currentSub]());
  } else {
    mainEl.append(TABS[name]());
  }
  if (typeof WIKI_SHELL !== 'undefined') WIKI_SHELL.setSidebarActive(name, subs ? currentSub : null);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.GUIDE_BOOT = { showTab, showHome, lastTab: 'Home' };

for (const k of Object.keys(TABS)) {
  const b = document.createElement('button');
  b.textContent = k;
  b.dataset.tab = k;
  if (k === 'Home') b.classList.add('on');
  b.onclick = () => { GUIDE_BOOT.lastTab = k; showTab(k); };
  tabsEl.append(b);
}

document.getElementById('genInfo').textContent =
  `${I.length.toLocaleString()} items · ${GUIDE_DATA.mods.length} mods`;

document.getElementById('dossier').onclick = e => { if (e.target.id === 'dossier') closeDossier(); };

document.addEventListener('click', e => {
  const cp = e.target.closest('[data-copy]');
  if (cp) { copyToast(cp.dataset.copy); e.stopPropagation(); return; }
  const ch = e.target.closest('[data-chest]');
  if (ch) { openChestPanel(+ch.dataset.chest); return; }
  const rm = e.target.closest('[data-room]');
  if (rm) { openRoomPanel(rm.dataset.room); return; }
  const pl = e.target.closest('[data-pool]');
  if (pl) { openPoolPanel(pl.dataset.pool); return; }
  const lfp = e.target.closest('[data-lf-pool]');
  if (lfp) { openPoolByName(lfp.dataset.lfPool, lfp.dataset.lfMod); return; }
  const vz = e.target.closest('[data-vzone]');
  if (vz) { openVehZonePanel(vz.dataset.vzone); return; }
  const veh = e.target.closest('[data-veh]');
  if (veh) { WIKI.open(veh.dataset.veh, { kind: 'vehicle' }); return; }
  const a = e.target.closest('a.ilink');
  if (a?.dataset.id) { WIKI.open(a.dataset.id); return; }
});

</script>
<script src="wiki-loot.js"></script>
<script src="wiki-shell.js"></script>
<script src="wiki.js"></script>
<script>
WIKI.init({
  config: {"siteName":"HellDrinx Wiki","siteUrl":"https://KingsFortune.github.io/HelldrinxGuide","description":"Project Zomboid HellDrinx server — items, loot, vehicles, quests"},
  icons: typeof GUIDE_ICONS !== 'undefined' ? GUIDE_ICONS : {},
  items: I,
  vehicles: (typeof GUIDE_VEH !== 'undefined' ? GUIDE_VEH.vehicles : []),
});
if (typeof WIKI_SHELL !== 'undefined') WIKI_SHELL.init();
if (!/^#wiki\//.test(location.hash)) showHome();
</script>
</body>
</html>
